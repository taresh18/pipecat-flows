name: Update Documentation on PR Merge

on:
  pull_request_target:
    types: [closed]
    branches: [main]
    paths:
      - "src/pipecat_flows/**"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to generate docs for"
        required: true
        type: string

jobs:
  update-docs:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout pipecat-flows
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          repository: pipecat-ai/docs
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          path: _docs

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update documentation
        uses: anthropics/claude-code-action@v1
        env:
          DOCS_SYNC_TOKEN: ${{ secrets.DOCS_SYNC_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are updating documentation for pipecat-flows.

            ## Context
            - PR #${{ steps.pr.outputs.number }} was merged into main in pipecat-ai/pipecat-flows.
            - The docs repo is checked out at `./_docs`.
            - The pipecat-flows repo (this repo) is checked out at the workspace root.

            ## Task
            1. Read the skill instructions at `.claude/skills/update-docs/SKILL.md`.
            2. Read the source-to-doc mapping at `.claude/skills/update-docs/SOURCE_DOC_MAPPING.md`.
            3. Follow the skill instructions using `_docs` as the DOCS_PATH.
               - For Step 3 (detect changes), compare against the merge base with main for PR #${{ steps.pr.outputs.number }}:
                 `git log --format=%H main | head -1` to get the base, then diff against that.
               - Skip Step 2 (branch creation) — the action handles branching below.
            4. After making all doc edits, stop. Do not commit or push.

            ## Important
            - Only edit files inside `_docs/`. Never modify files in the pipecat-flows repo.
            - Be conservative: only update docs for things that actually changed in the source.
          allowed_tools: "Read,Write,Edit,Glob,Grep,Bash"
          direct_prompt: true
          model: claude-sonnet-4-5-20250929
          max_turns: "30"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.DOCS_SYNC_TOKEN }}
        run: |
          cd _docs

          # Check if there are any changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No documentation changes needed."
            exit 0
          fi

          BRANCH="docs/flows-pr-${{ steps.pr.outputs.number }}"
          PR_NUM="${{ steps.pr.outputs.number }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "docs: update for pipecat-flows PR #${PR_NUM}"
          git push origin "$BRANCH"

          BODY=$(cat <<EOF
          Automated documentation update for [pipecat-flows PR #${PR_NUM}](https://github.com/pipecat-ai/pipecat-flows/pull/${PR_NUM}).

          Generated by the pipecat-flows docs update workflow.
          EOF
          )

          gh pr create \
            --repo pipecat-ai/docs \
            --base main \
            --head "$BRANCH" \
            --title "docs: update for pipecat-flows PR #${PR_NUM}" \
            --body "$BODY"
